  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"zh\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0, user-scalable=no\">\n<title>Kandimusic<\u002Ftitle>\n\n<style>\n  * { margin: 0; padding: 0; box-sizing: border-box; }\n  html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1510; }\n  canvas { display: block; cursor: crosshair; touch-action: none; }\n\n  #ui-label {\n    position: fixed; top: 22px; left: 28px;\n    color: rgba(200,185,155,0.45);\n    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;\n    font-size: 10px; letter-spacing: 0.28em; text-transform: uppercase;\n    pointer-events: none; user-select: none;\n  }\n  #ui-hint {\n    position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);\n    color: rgba(200,185,155,0.35);\n    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;\n    font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;\n    pointer-events: none; user-select: none;\n    transition: opacity 1.5s;\n  }\n\n  #overlay {\n    position: fixed; inset: 0;\n    background: #1a1510;\n    display: flex; flex-direction: column;\n    align-items: center; justify-content: center;\n    cursor: pointer; z-index: 100;\n    transition: opacity 0.8s;\n  }\n  #overlay-title {\n    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;\n    font-weight: 200; font-size: clamp(24px, 4vw, 42px);\n    letter-spacing: 0.45em; text-transform: uppercase;\n    color: #f0e8d8; margin-bottom: 18px;\n  }\n  #overlay-sub {\n    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;\n    font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase;\n    color: rgba(240,232,216,0.35);\n  }\n  #overlay-dot {\n    width: 6px; height: 6px; border-radius: 50%;\n    background: #c8362a; margin: 28px auto 0;\n    animation: pulse 2s ease-in-out infinite;\n  }\n  @keyframes pulse {\n    0%,100% { opacity: 0.3; transform: scale(1); }\n    50% { opacity: 1; transform: scale(1.4); }\n  }\n\n  /* Tweaks panel */\n  #tweaks-panel {\n    display: none;\n    position: fixed; bottom: 20px; right: 20px;\n    background: rgba(26,21,16,0.92); border: 1px solid rgba(200,185,155,0.15);\n    border-radius: 2px; padding: 16px 18px; min-width: 200px;\n    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;\n    font-size: 11px; color: rgba(200,185,155,0.7);\n    letter-spacing: 0.1em; z-index: 99;\n    backdrop-filter: blur(8px);\n  }\n  #tweaks-panel h3 { font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase; margin-bottom: 14px; color: rgba(200,185,155,0.45); }\n  .tweak-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }\n  .tweak-row label { font-size: 10px; letter-spacing: 0.1em; }\n  .tweak-row input[type=range] { width: 90px; accent-color: #c8362a; }\n  .tweak-row select { background: rgba(200,185,155,0.08); border: 1px solid rgba(200,185,155,0.2); color: rgba(200,185,155,0.8); font-size: 10px; padding: 2px 4px; border-radius: 1px; }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<canvas id=\"c\"><\u002Fcanvas>\n<div id=\"ui-label\">Kandimusic<\u002Fdiv>\n<div id=\"ui-hint\">Tap &nbsp;·&nbsp; Hold &nbsp;·&nbsp; Drag<\u002Fdiv>\n\n<div id=\"overlay\">\n  <div id=\"overlay-title\">Kandimusic<\u002Fdiv>\n  <div id=\"overlay-sub\">An interactive sound painting<\u002Fdiv>\n  <div id=\"overlay-dot\"><\u002Fdiv>\n<\u002Fdiv>\n\n<div id=\"tweaks-panel\">\n  <h3>Tweaks<\u002Fh3>\n  <div class=\"tweak-row\"><label>Reverb<\u002Flabel><input type=\"range\" id=\"tw-reverb\" min=\"0\" max=\"1\" step=\"0.05\" value=\"0.45\"><\u002Fdiv>\n  <div class=\"tweak-row\"><label>Master Vol<\u002Flabel><input type=\"range\" id=\"tw-vol\" min=\"-30\" max=\"0\" step=\"1\" value=\"-6\"><\u002Fdiv>\n  <div class=\"tweak-row\"><label>Scale<\u002Flabel>\n    <select id=\"tw-scale\">\n      <option value=\"penta\">Pentatonic<\u002Foption>\n      <option value=\"major\">Major<\u002Foption>\n      <option value=\"minor\">Minor<\u002Foption>\n      <option value=\"chromatic\">Chromatic<\u002Foption>\n    <\u002Fselect>\n  <\u002Fdiv>\n  <div class=\"tweak-row\"><label>Trail Opacity<\u002Flabel><input type=\"range\" id=\"tw-trail\" min=\"0\" max=\"1\" step=\"0.05\" value=\"0.5\"><\u002Fdiv>\n<\u002Fdiv>\n\n<script src=\"e42e0a30-e64c-4ea2-97b1-d5930bcbdb73\"><\u002Fscript>\n<script>\n// ══════════════════════════════════════════════════════\n//  KANDIMUSIC  —  Interactive Sound Painting\n// ══════════════════════════════════════════════════════\n\nconst canvas = document.getElementById('c');\nconst ctx = canvas.getContext('2d');\nlet W, H, DPR;\n\nfunction resize() {\n  DPR = window.devicePixelRatio || 1;\n  W = window.innerWidth; H = window.innerHeight;\n  canvas.width = W * DPR; canvas.height = H * DPR;\n  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';\n  ctx.scale(DPR, DPR);\n}\nresize();\nwindow.addEventListener('resize', resize);\n\n// ── PALETTE ─────────────────────────────────────────\nconst C = {\n  cream:  '#f4ede0',\n  black:  '#1c1814',\n  purple: '#7040a8',\n  red:    '#c8362a',\n  blue:   '#2a58b0',\n  yellow: '#e8c832',\n  orange: '#c86820',\n  teal:   '#387878',\n  gold:   '#a07030',\n  gray:   '#8a8880',\n  lilac:  '#9878b8',\n  skyblue:'#8ab0cc',\n  olive:  '#687838',\n  pink:   '#c07898',\n  brown:  '#7a5030',\n};\n\n// ── TWEAK DEFAULTS ───────────────────────────────────\nconst TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{\n  \"reverbWet\": 0.25,\n  \"masterVol\": -16,\n  \"scale\": \"major\",\n  \"trailOpacity\": 0.5\n}/*EDITMODE-END*/;\nlet tweaks = {...TWEAK_DEFAULTS};\n\n// ── SCALES ──────────────────────────────────────────\nconst SCALES = {\n  penta: ['C3','E3','G3','A3','C4','E4','G4','A4','C5','E5'],\n  major: ['C3','D3','E3','G3','A3','C4','D4','E4','G4','A4','C5'],\n  minor: ['C3','D3','Eb3','G3','Ab3','C4','D4','Eb4','G4','Ab4'],\n  chromatic: ['C3','Db3','D3','Eb3','E3','F3','F#3','G3','Ab3','A3','Bb3','B3','C4'],\n};\n\nfunction scaleNote(idx) {\n  const s = SCALES[tweaks.scale] || SCALES.penta;\n  return s[idx % s.length];\n}\n\n// ── SHAPES DEFINITION ────────────────────────────────\n// All positional values are normalized 0–1\n// type: circle | dot | line | arc | triangle | rect | checker | curve\n\nfunction buildShapes() {\n  return [\n\n    // ════ LARGE CONCENTRIC CIRCLE SYSTEM — top-left ════\n    { id:'cc-outer', type:'circle', cx:.115, cy:.21, r:.115,\n      fill:C.purple, stroke:C.black, sw:3.5,\n      sound:'pad', notes:['C2','G2','C3'], idx:0 },\n    { id:'cc-mid', type:'circle', cx:.115, cy:.21, r:.082,\n      fill:C.black, stroke:'none', sw:0,\n      sound:'pad', notes:['C2','G2'], idx:0 },\n    { id:'cc-inner', type:'circle', cx:.115, cy:.21, r:.046,\n      fill:C.purple, stroke:'none', sw:0,\n      sound:'pluck', notes:['G4'], idx:2 },\n\n    // ════ RED CIRCLE — left, below concentric ════\n    { id:'red-orb', type:'circle', cx:.085, cy:.375, r:.078,\n      fill:C.red, stroke:'none', sw:0,\n      sound:'pad', notes:['E3','G3','B3'], idx:1 },\n\n    // ════ YELLOW CIRCLE — bottom-left ════\n    { id:'yellow-orb', type:'circle', cx:.125, cy:.788, r:.072,\n      fill:C.yellow, stroke:'#444', sw:2,\n      sound:'pluck', notes:['E4'], idx:3 },\n\n    // ════ BLUE CIRCLE — center-low ════\n    { id:'blue-orb', type:'circle', cx:.37, cy:.83, r:.064,\n      fill:C.blue, stroke:'#222', sw:2,\n      sound:'pluck', notes:['G4'], idx:4 },\n\n    // ════ LILAC CIRCLE — bottom-right area ════\n    { id:'lilac-orb', type:'circle', cx:.62, cy:.828, r:.057,\n      fill:C.lilac, stroke:'#555', sw:1.5,\n      sound:'pluck', notes:['A4'], idx:5 },\n\n    // ════ GRAY CIRCLE — far bottom-right ════\n    { id:'gray-orb', type:'circle', cx:.808, cy:.862, r:.072,\n      fill:C.gray, stroke:'#444', sw:1.5,\n      sound:'pluck', notes:['D4'], idx:6 },\n\n    // ════ GOLD CIRCLE — overlaps gray ════\n    { id:'gold-orb', type:'circle', cx:.738, cy:.818, r:.045,\n      fill:C.gold, stroke:'#333', sw:1.5,\n      sound:'pluck', notes:['B3'], idx:7 },\n\n    // ════ OUTLINED WHITE CIRCLE — center ════\n    { id:'white-circ', type:'circle', cx:.325, cy:.298, r:.057,\n      fill:'rgba(255,255,255,0.02)', stroke:'#333', sw:2,\n      sound:'pluck', notes:['B4'], idx:8 },\n\n    // ════ SMALL BLUE CIRCLE — upper right area ════\n    { id:'blue-sm', type:'circle', cx:.635, cy:.185, r:.025,\n      fill:C.blue, stroke:'#222', sw:1.5,\n      sound:'pluck', notes:['C5'], idx:9 },\n\n    // ════ CONCENTRIC TRIO — right-center ════\n    { id:'conc-r1', type:'circle', cx:.782, cy:.485, r:.065,\n      fill:'none', stroke:'#666', sw:1.5,\n      sound:'pluck', notes:['D5'], idx:8 },\n    { id:'conc-r2', type:'circle', cx:.782, cy:.485, r:.04,\n      fill:'none', stroke:'#777', sw:1.2,\n      sound:'pluck', notes:['F5'], idx:9 },\n    { id:'conc-r3', type:'circle', cx:.782, cy:.485, r:.018,\n      fill:C.blue, stroke:'none', sw:0,\n      sound:'pluck', notes:['A5'], idx:0 },\n\n    // ════ SMALL GRAY CIRCLE — upper ════\n    { id:'gray-sm', type:'circle', cx:.545, cy:.118, r:.028,\n      fill:C.gray, stroke:'#555', sw:1,\n      sound:'pluck', notes:['E5'], idx:5 },\n\n    // ════ SMALL ORANGE CIRCLE ════\n    { id:'orange-sm', type:'circle', cx:.795, cy:.245, r:.024,\n      fill:C.orange, stroke:'#444', sw:1,\n      sound:'pluck', notes:['A4'], idx:6 },\n\n    // ════ WHITE OUTLINED CIRCLE — bottom-right ════\n    { id:'white-r', type:'circle', cx:.92, cy:.18, r:.038,\n      fill:'rgba(255,255,255,0.06)', stroke:'#333', sw:2,\n      sound:'pluck', notes:['G5'], idx:9 },\n\n    // ════ CONCENTRIC PAIR — bottom-center ════\n    { id:'arc-bot1', type:'circle', cx:.54, cy:.815, r:.055,\n      fill:'none', stroke:'rgba(100,100,100,0.5)', sw:1.5,\n      sound:'pluck', notes:['C4'], idx:2 },\n    { id:'arc-bot2', type:'circle', cx:.54, cy:.815, r:.035,\n      fill:'none', stroke:'rgba(100,100,100,0.4)', sw:1,\n      sound:'pluck', notes:['E4'], idx:3 },\n\n    // ════ SCATTERED SMALL DOTS ════\n    { id:'dot1', type:'dot', cx:.482, cy:.172, r:.011, fill:C.red, sound:'pluck', notes:['C5'], idx:0 },\n    { id:'dot2', type:'dot', cx:.592, cy:.615, r:.008, fill:C.red, sound:'pluck', notes:['D5'], idx:1 },\n    { id:'dot3', type:'dot', cx:.622, cy:.578, r:.006, fill:'#333', sound:'pluck', notes:['E5'], idx:2 },\n    { id:'dot4', type:'dot', cx:.558, cy:.655, r:.007, fill:C.red, sound:'pluck', notes:['F5'], idx:3 },\n    { id:'dot5', type:'dot', cx:.505, cy:.56,  r:.005, fill:'#444', sound:'pluck', notes:['G5'], idx:4 },\n    { id:'dot6', type:'dot', cx:.638, cy:.638, r:.006, fill:'#555', sound:'pluck', notes:['A5'], idx:5 },\n\n    // ════ DIAGONAL LINES — the spine of the composition ════\n    { id:'ln-1', type:'line', x1:.595, y1:.01, x2:.912, y2:.98,\n      stroke:C.black, sw:2.5, sound:'sustain', notes:['A3'], idx:0 },\n    { id:'ln-2', type:'line', x1:.225, y1:.035, x2:.782, y2:.965,\n      stroke:C.black, sw:1.5, sound:'sustain', notes:['D4'], idx:1 },\n    { id:'ln-3', type:'line', x1:.725, y1:.015, x2:.275, y2:.885,\n      stroke:C.black, sw:1.2, sound:'sustain', notes:['G3'], idx:2 },\n    { id:'ln-4', type:'line', x1:.04, y1:.445, x2:.96, y2:.555,\n      stroke:C.black, sw:1.0, sound:'sustain', notes:['E3'], idx:3 },\n    { id:'ln-red', type:'line', x1:.545, y1:.055, x2:.695, y2:.832,\n      stroke:C.red, sw:3.5, sound:'sustain', notes:['B3'], idx:4 },\n    { id:'ln-5', type:'line', x1:.385, y1:.068, x2:.145, y2:.755,\n      stroke:'#555', sw:1.0, sound:'sustain', notes:['F3'], idx:5 },\n    { id:'ln-6', type:'line', x1:.835, y1:.108, x2:.445, y2:.548,\n      stroke:C.black, sw:0.8, sound:'sustain', notes:['C4'], idx:6 },\n    { id:'ln-7', type:'line', x1:.255, y1:.018, x2:.075, y2:.625,\n      stroke:'#666', sw:0.8, sound:'sustain', notes:['A4'], idx:7 },\n    { id:'ln-8', type:'line', x1:.445, y1:.925, x2:.965, y2:.285,\n      stroke:C.black, sw:1.0, sound:'sustain', notes:['F4'], idx:8 },\n    { id:'ln-9', type:'line', x1:.015, y1:.285, x2:.445, y2:.965,\n      stroke:'#777', sw:0.8, sound:'sustain', notes:['G4'], idx:9 },\n    { id:'ln-10', type:'line', x1:.615, y1:.025, x2:.025, y2:.615,\n      stroke:C.black, sw:0.7, sound:'sustain', notes:['C3'], idx:0 },\n\n    // ════ TRIANGLES ════\n    // Large sky-blue mountain — center-upper\n    { id:'tri-mountain', type:'triangle',\n      pts:[[.38,.08],[.56,.38],[.20,.38]],\n      fill:'rgba(138,176,204,0.35)', stroke:'rgba(100,140,170,0.5)', sw:1.2,\n      sound:'pad', notes:['C4','E4','G4'], idx:2 },\n\n    // Bold outline triangle above\n    { id:'tri-outline', type:'triangle',\n      pts:[[.465,.03],[.535,.17],[.395,.17]],\n      fill:'rgba(255,255,255,0.0)', stroke:C.black, sw:1.5,\n      sound:'pluck', notes:['E5'], idx:0 },\n\n    // Yellow triangle — upper-right\n    { id:'tri-yellow', type:'triangle',\n      pts:[[.648,.095],[.688,.172],[.608,.172]],\n      fill:C.yellow, stroke:'#444', sw:1,\n      sound:'pluck', notes:['G4'], idx:3 },\n\n    // Gold/tan triangle — lower-right\n    { id:'tri-gold', type:'triangle',\n      pts:[[.855,.698],[.925,.888],[.785,.888]],\n      fill:C.gold, stroke:'#444', sw:1.5,\n      sound:'pluck', notes:['A3'], idx:7 },\n\n    // Small dark triangle — left cluster\n    { id:'tri-dark', type:'triangle',\n      pts:[[.238,.448],[.268,.508],[.208,.508]],\n      fill:'#2a2218', stroke:'none', sw:0,\n      sound:'pluck', notes:['D3'], idx:1 },\n\n    // ════ RECTANGLES / COLOR BLOCKS ════\n    { id:'rect-black-tr', type:'rect', x:.862, y:.075, w:.038, h:.032,\n      fill:C.black, stroke:'none', sw:0,\n      sound:'pad', notes:['D3','F3','A3'], idx:0 },\n    { id:'rect-sq-tr', type:'rect', x:.926, y:.048, w:.018, h:.018,\n      fill:'none', stroke:C.black, sw:1.5,\n      sound:'pluck', notes:['E3'], idx:1 },\n    { id:'rect-red-r', type:'rect', x:.915, y:.558, w:.028, h:.020,\n      fill:C.red, stroke:'none', sw:0,\n      sound:'pad', notes:['E3','G3','B3'], idx:4 },\n    { id:'rect-blue-bot', type:'rect', x:.425, y:.905, w:.042, h:.042,\n      fill:C.blue, stroke:'none', sw:0,\n      sound:'pad', notes:['F3','A3','C4'], idx:5 },\n    { id:'rect-small-1', type:'rect', x:.732, y:.458, w:.016, h:.016,\n      fill:C.black, stroke:'none', sw:0,\n      sound:'pluck', notes:['A4'], idx:6 },\n    { id:'rect-small-2', type:'rect', x:.332, y:.722, w:.014, h:.014,\n      fill:'#444', stroke:'none', sw:0,\n      sound:'pluck', notes:['B4'], idx:7 },\n    { id:'rect-small-3', type:'rect', x:.855, y:.905, w:.032, h:.022,\n      fill:C.red, stroke:'none', sw:0,\n      sound:'pad', notes:['G3','B3','D4'], idx:8 },\n    { id:'rect-pink', type:'rect', x:.582, y:.322, w:.085, h:.055,\n      fill:'rgba(192,120,152,0.55)', stroke:'none', sw:0,\n      sound:'pad', notes:['A3','C4','E4'], idx:9 },\n    // Grid-like stripes right\n    { id:'rect-grid', type:'rect', x:.875, y:.308, w:.065, h:.095,\n      fill:'none', stroke:'rgba(100,100,100,0.4)', sw:1,\n      sound:'pad', notes:['C3','E3','G3'], idx:2 },\n\n    // ════ CHECKER BAND — left-center (Kandinsky signature) ════\n    { id:'checker', type:'checker',\n      x:.215, y:.395, w:.105, h:.235,\n      colors:[C.black,'#888',C.olive,C.brown,'#668899','#445566'],\n      sound:'pad', notes:['G2','B2','D3','F3'], idx:0 },\n\n    // ════ LARGE BLACK ARC — center-left ════\n    { id:'arc-main', type:'arc',\n      cx:.378, cy:.548, r:.185,\n      sa: -0.25, ea: Math.PI * 0.72,\n      stroke:C.black, sw:5.5, fill:'none',\n      sound:'sustain', notes:['C3'], idx:0 },\n\n    // ════ SMALL ARCS ════\n    { id:'arc-orange', type:'arc',\n      cx:.558, cy:.718, r:.058,\n      sa: -Math.PI*0.52, ea: Math.PI*0.52,\n      stroke:C.orange, sw:2, fill:'none',\n      sound:'sustain', notes:['E4'], idx:3 },\n    { id:'arc-sm-left', type:'arc',\n      cx:.198, cy:.618, r:.062,\n      sa: Math.PI*0.78, ea: Math.PI*1.82,\n      stroke:C.black, sw:4, fill:'none',\n      sound:'sustain', notes:['G3'], idx:2 },\n    { id:'arc-red-sm', type:'arc',\n      cx:.648, cy:.558, r:.028,\n      sa: -Math.PI*0.9, ea: Math.PI*0.1,\n      stroke:C.red, sw:1.5, fill:'none',\n      sound:'sustain', notes:['B4'], idx:4 },\n\n    // ════ ORANGE/TAN COLOR BLOCK — right side ════\n    { id:'tan-block', type:'triangle',\n      pts:[[.685,.428],[.758,.538],[.612,.538]],\n      fill:'rgba(168,128,60,0.65)', stroke:'#7a6030', sw:1,\n      sound:'pad', notes:['E3','A3','C4'], idx:6 },\n\n  ].map(s => ({ ...s, _clickT: 0, _longPress: false, _dragging: false, _waveAmp: 0, _wavePhase: 0 }));\n}\n\nlet shapes = buildShapes();\n\n// ── AUDIO ─────────────────────────────────────────────\nlet audioReady = false;\nlet pluck, sustain, pad, rev, dly, master;\n\nasync function startAudio() {\n  await Tone.start();\n\n  master = new Tone.Volume(tweaks.masterVol).toDestination();\n  rev    = new Tone.Reverb({ decay: 4, preDelay: 0.04, wet: tweaks.reverbWet }).connect(master);\n  dly    = new Tone.PingPongDelay({ delayTime: '8n.', feedback: 0.28, wet: 0.18 }).connect(rev);\n\n  pluck = new Tone.PluckSynth({\n    attackNoise: 2, dampening: 3800, resonance: 0.97\n  }).connect(dly);\n\n  sustain = new Tone.Synth({\n    oscillator: { type: 'sine' },\n    envelope: { attack: 0.25, decay: 0.05, sustain: 0.95, release: 1.2 },\n    volume: -10\n  }).connect(rev);\n\n  pad = new Tone.PolySynth(Tone.Synth, {\n    oscillator: { type: 'triangle8' },\n    envelope: { attack: 0.55, decay: 0.4, sustain: 0.65, release: 2.0 },\n    volume: -16\n  }).connect(rev);\n\n  audioReady = true;\n}\n\nlet thereminOn = false;\n\nfunction triggerClick(s) {\n  if (!audioReady) return;\n  if (s.sound === 'pluck') {\n    pluck.triggerAttackRelease(scaleNote(s.idx), '8n');\n  } else if (s.sound === 'sustain') {\n    sustain.triggerAttackRelease(scaleNote(s.idx), '4n');\n  } else if (s.sound === 'pad') {\n    const ns = (s.notes || [scaleNote(s.idx)]).map((_, i) => scaleNote(s.idx + i));\n    pad.triggerAttackRelease(ns.slice(0,3), '2n');\n  }\n}\n\nfunction triggerLongStart(s) {\n  if (!audioReady) return;\n  if (s.sound === 'pluck') {\n    // Arpeggiate\n    [0,4,7].forEach((semi, i) => {\n      setTimeout(() => {\n        if (s._longPress) pluck.triggerAttackRelease(\n          Tone.Frequency(scaleNote(s.idx)).transpose(semi).toNote(), '8n');\n      }, i * 180);\n    });\n  } else if (s.sound === 'pad') {\n    const ns = [0,4,7].map(i => scaleNote(s.idx + i));\n    pad.triggerAttack(ns);\n  } else if (s.sound === 'sustain') {\n    sustain.triggerAttack(scaleNote(s.idx));\n    thereminOn = true;\n  }\n}\n\nfunction triggerLongEnd(s) {\n  if (!audioReady) return;\n  if (s.sound === 'pad') {\n    const ns = [0,4,7].map(i => scaleNote(s.idx + i));\n    try { pad.triggerRelease(ns); } catch(e) {}\n  }\n  if (s.sound === 'sustain' && thereminOn) {\n    sustain.triggerRelease(); thereminOn = false;\n  }\n}\n\nfunction triggerDrag(s, py) {\n  if (!audioReady) return;\n  if (s.sound === 'sustain') {\n    const freq = 80 + (1 - py / H) * 1100;\n    if (!thereminOn) {\n      sustain.triggerAttack(freq); thereminOn = true;\n    } else {\n      sustain.frequency.rampTo(freq, 0.06);\n    }\n  }\n}\n\nfunction triggerDragEnd(s) {\n  if (!audioReady) return;\n  if (thereminOn) { sustain.triggerRelease(); thereminOn = false; }\n}\n\n// ── EFFECTS ARRAYS ────────────────────────────────────\nlet ripples = []; // {x,y,r,maxR,a,color}\nlet trails  = []; // {pts[],a,color,alive}\nlet curTrail = null;\n\nfunction addRipple(x, y, color) {\n  ripples.push({ x, y, r: 4, maxR: Math.min(W,H)*0.15, a: 0.75, color });\n}\n\nfunction shapeColor(s) {\n  if (s.fill && s.fill !== 'none' && !s.fill.startsWith('rgba(255,255,255')) return s.fill;\n  if (s.stroke && s.stroke !== 'none') return s.stroke;\n  return '#aaa';\n}\n\n// ── HIT DETECTION ─────────────────────────────────────\nfunction hit(s, px, py) {\n  const x = px / W, y = py / H;\n  const P = 0.018; // padding (normalized)\n  switch (s.type) {\n    case 'circle': case 'dot': {\n      const dx = x-s.cx, dy = y-s.cy, rn = s.r + P;\n      return dx*dx+dy*dy <= rn*rn;\n    }\n    case 'line': {\n      const {x1,y1,x2,y2} = s;\n      const len2 = (x2-x1)**2+(y2-y1)**2;\n      if (!len2) return false;\n      const t = Math.max(0,Math.min(1,((x-x1)*(x2-x1)+(y-y1)*(y2-y1))/len2));\n      const dx=x-(x1+t*(x2-x1)), dy=y-(y1+t*(y2-y1));\n      return Math.sqrt(dx*dx+dy*dy) < P*1.6;\n    }\n    case 'triangle': {\n      const [p0,p1,p2] = s.pts;\n      return ptInTri(x,y,p0,p1,p2);\n    }\n    case 'rect': case 'checker': case 'rect-grid':\n      return x>=s.x-P && x<=s.x+s.w+P && y>=s.y-P && y<=s.y+s.h+P;\n    case 'arc': {\n      const dx=x-s.cx, dy=y-s.cy;\n      const dist=Math.sqrt(dx*dx+dy*dy);\n      if (Math.abs(dist-s.r) > P*2.5) return false;\n      let ang=Math.atan2(dy,dx);\n      if (ang < s.sa) ang += Math.PI*2;\n      return ang <= s.ea + (s.ea < s.sa ? Math.PI*2 : 0) + 0.3;\n    }\n  }\n  return false;\n}\n\nfunction ptInTri(px,py,a,b,c) {\n  const s1 = (px-b[0])*(a[1]-b[1])-(a[0]-b[0])*(py-b[1]);\n  const s2 = (px-c[0])*(b[1]-c[1])-(b[0]-c[0])*(py-c[1]);\n  const s3 = (px-a[0])*(c[1]-a[1])-(c[0]-a[0])*(py-a[1]);\n  return !((s1<0||s2<0||s3<0) && (s1>0||s2>0||s3>0));\n}\n\nfunction findShape(px, py) {\n  for (let i = shapes.length-1; i >= 0; i--)\n    if (hit(shapes[i], px, py)) return shapes[i];\n  return null;\n}\n\n// ── INPUT ─────────────────────────────────────────────\nlet ptr = {x:0,y:0,down:false};\nlet dragOrigin = null;\nlet dragging = false;\nlet activeShape = null;\nlet longTimer = null;\nlet longShape = null;\n\nfunction getPos(e) {\n  if (e.touches) return {x:e.touches[0].clientX, y:e.touches[0].clientY};\n  return {x:e.clientX, y:e.clientY};\n}\n\nfunction onDown(e) {\n  const p = getPos(e);\n  ptr = {...p, down:true};\n  dragOrigin = p; dragging = false;\n  activeShape = findShape(p.x, p.y);\n  clearTimeout(longTimer);\n  if (activeShape) {\n    longTimer = setTimeout(() => {\n      if (!dragging && activeShape) {\n        longShape = activeShape;\n        activeShape._longPress = true;\n        triggerLongStart(activeShape);\n      }\n    }, 380);\n  }\n}\n\nfunction onMove(e) {\n  if (!ptr.down) return;\n  const p = getPos(e);\n  const dx = p.x-dragOrigin.x, dy = p.y-dragOrigin.y;\n  if (Math.sqrt(dx*dx+dy*dy) > 7) {\n    if (!dragging) { clearTimeout(longTimer); dragging = true; }\n    if (activeShape) {\n      activeShape._dragging = true;\n      if (activeShape.type === 'line' || activeShape.type === 'arc') {\n        activeShape._waveAmp = 1.0;\n        activeShape._wavePhase += 0.35;\n      }\n      if (!curTrail) {\n        curTrail = {pts:[], a: tweaks.trailOpacity, color: shapeColor(activeShape), alive:true};\n        trails.push(curTrail);\n      }\n      if (curTrail.pts.length > 55) curTrail.pts.shift();\n      curTrail.pts.push({x:p.x, y:p.y});\n      triggerDrag(activeShape, p.y);\n    }\n  }\n  ptr = {...p, down:true};\n}\n\nfunction onUp(e) {\n  ptr.down = false;\n  clearTimeout(longTimer);\n  const p = getPos(e) || ptr;\n\n  if (!dragging && activeShape) {\n    activeShape._clickT = performance.now();\n    addRipple(p.x, p.y, shapeColor(activeShape));\n    triggerClick(activeShape);\n  }\n  if (longShape) {\n    triggerLongEnd(longShape);\n    longShape._longPress = false;\n    longShape = null;\n  }\n  if (dragging && activeShape) {\n    activeShape._dragging = false;\n    triggerDragEnd(activeShape);\n  }\n  if (curTrail) { curTrail.alive = false; curTrail = null; }\n  dragging = false; activeShape = null;\n}\n\ncanvas.addEventListener('mousedown', onDown);\ncanvas.addEventListener('mousemove', onMove);\ncanvas.addEventListener('mouseup', onUp);\ncanvas.addEventListener('touchstart', e=>{e.preventDefault();onDown(e);}, {passive:false});\ncanvas.addEventListener('touchmove', e=>{e.preventDefault();onMove(e);}, {passive:false});\ncanvas.addEventListener('touchend', e=>{e.preventDefault();onUp(e);}, {passive:false});\n\n// ── DRAW HELPERS ──────────────────────────────────────\nfunction getClickScale(s) {\n  const elapsed = performance.now() - s._clickT;\n  if (elapsed > 450) return 1;\n  return 1 + 0.18 * Math.sin((elapsed/450) * Math.PI);\n}\n\nfunction getAlpha(s) {\n  if (s._longPress) return 0.45 + 0.45 * Math.sin(ts * 2.8);\n  return 1;\n}\n\nfunction applyScale(s, cx, cy) {\n  const sc = getClickScale(s);\n  if (sc === 1) return;\n  ctx.translate(cx, cy); ctx.scale(sc, sc); ctx.translate(-cx, -cy);\n}\n\nfunction drawCircleShape(s) {\n  const cx=s.cx*W, cy=s.cy*H, r=s.r*Math.min(W,H);\n  ctx.save();\n  ctx.globalAlpha = getAlpha(s);\n  if (s._longPress) {\n    ctx.translate(cx,cy); ctx.rotate(ts*1.8); ctx.translate(-cx,-cy);\n  }\n  applyScale(s, cx, cy);\n  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);\n  if (s.fill && s.fill!=='none') { ctx.fillStyle=s.fill; ctx.fill(); }\n  if (s.stroke && s.stroke!=='none') { ctx.strokeStyle=s.stroke; ctx.lineWidth=s.sw; ctx.stroke(); }\n  ctx.restore();\n}\n\nfunction drawDotShape(s) {\n  const cx=s.cx*W, cy=s.cy*H, r=s.r*Math.min(W,H);\n  ctx.save();\n  ctx.globalAlpha = getAlpha(s);\n  applyScale(s, cx, cy);\n  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);\n  ctx.fillStyle=s.fill; ctx.fill();\n  ctx.restore();\n}\n\nfunction drawLineShape(s) {\n  ctx.save();\n  ctx.globalAlpha = getAlpha(s);\n  ctx.strokeStyle=s.stroke; ctx.lineWidth=s.sw; ctx.lineCap='round';\n  const x1=s.x1*W, y1=s.y1*H, x2=s.x2*W, y2=s.y2*H;\n  const wav=s._waveAmp, ph=s._wavePhase;\n  if (wav > 0.01) {\n    const dx=x2-x1, dy=y2-y1, len=Math.sqrt(dx*dx+dy*dy);\n    const nx=-dy/len, ny=dx/len;\n    ctx.beginPath();\n    const steps=50;\n    for (let i=0;i<=steps;i++) {\n      const t=i/steps;\n      const lx=x1+dx*t, ly=y1+dy*t;\n      const amp=wav*22*Math.sin(t*Math.PI);\n      const wv=amp*Math.sin(t*12+ph);\n      if(i===0) ctx.moveTo(lx+nx*wv, ly+ny*wv);\n      else ctx.lineTo(lx+nx*wv, ly+ny*wv);\n    }\n    ctx.stroke();\n    s._waveAmp *= 0.91;\n  } else {\n    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();\n  }\n  ctx.restore();\n}\n\nfunction drawTriShape(s) {\n  const pts=s.pts;\n  const cx=((pts[0][0]+pts[1][0]+pts[2][0])/3)*W;\n  const cy=((pts[0][1]+pts[1][1]+pts[2][1])/3)*H;\n  ctx.save();\n  ctx.globalAlpha = getAlpha(s);\n  if (s._longPress) { ctx.translate(cx,cy); ctx.rotate(ts*2.5); ctx.translate(-cx,-cy); }\n  applyScale(s, cx, cy);\n  ctx.beginPath();\n  ctx.moveTo(pts[0][0]*W, pts[0][1]*H);\n  ctx.lineTo(pts[1][0]*W, pts[1][1]*H);\n  ctx.lineTo(pts[2][0]*W, pts[2][1]*H);\n  ctx.closePath();\n  if (s.fill && s.fill!=='none') { ctx.fillStyle=s.fill; ctx.fill(); }\n  if (s.stroke && s.stroke!=='none') { ctx.strokeStyle=s.stroke; ctx.lineWidth=s.sw; ctx.stroke(); }\n  ctx.restore();\n}\n\nfunction drawRectShape(s) {\n  const x=s.x*W, y=s.y*H, w=s.w*W, h=s.h*H;\n  const cx=x+w/2, cy=y+h/2;\n  ctx.save();\n  ctx.globalAlpha = getAlpha(s);\n  if (s._longPress) { ctx.translate(cx,cy); ctx.rotate(ts*2); ctx.translate(-cx,-cy); }\n  applyScale(s, cx, cy);\n  ctx.beginPath(); ctx.rect(x,y,w,h);\n  if (s.fill && s.fill!=='none') { ctx.fillStyle=s.fill; ctx.fill(); }\n  if (s.stroke && s.stroke!=='none') { ctx.strokeStyle=s.stroke; ctx.lineWidth=s.sw; ctx.stroke(); }\n  ctx.restore();\n}\n\nfunction drawChecker(s) {\n  const x=s.x*W, y=s.y*H, w=s.w*W, h=s.h*H;\n  ctx.save();\n  ctx.globalAlpha = getAlpha(s);\n  // Slight diagonal skew\n  ctx.transform(1, 0, -0.18, 1, y*0.18, 0);\n  const rows=8, cols=4;\n  const cw=w/cols, ch=h/rows;\n  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++) {\n    ctx.fillStyle=s.colors[(r+c)%s.colors.length];\n    ctx.fillRect(x+c*cw, y+r*ch, cw, ch);\n  }\n  ctx.restore();\n}\n\nfunction drawArcShape(s) {\n  const cx=s.cx*W, cy=s.cy*H, r=s.r*Math.min(W,H);\n  ctx.save();\n  ctx.globalAlpha = getAlpha(s);\n  ctx.strokeStyle=s.stroke; ctx.lineWidth=s.sw; ctx.lineCap='round';\n  if (s._longPress) { ctx.translate(cx,cy); ctx.rotate(ts*1.2); ctx.translate(-cx,-cy); }\n  const wav=s._waveAmp||0;\n  if (wav > 0.01) {\n    // Draw wavy arc\n    ctx.beginPath();\n    const steps=60;\n    for (let i=0;i<=steps;i++) {\n      const ang=s.sa+(s.ea-s.sa)*(i/steps);\n      const t=i/steps;\n      const amp=wav*16*Math.sin(t*Math.PI);\n      const wv=amp*Math.sin(t*10+(s._wavePhase||0));\n      const rr=r+wv;\n      const lx=cx+Math.cos(ang)*rr, ly=cy+Math.sin(ang)*rr;\n      if(i===0) ctx.moveTo(lx,ly); else ctx.lineTo(lx,ly);\n    }\n    ctx.stroke();\n    s._waveAmp*=0.92;\n  } else {\n    ctx.beginPath(); ctx.arc(cx,cy,r,s.sa,s.ea);\n    ctx.stroke();\n  }\n  ctx.restore();\n}\n\nfunction drawRipples() {\n  ripples = ripples.filter(r=>r.a>0.01);\n  for (const rip of ripples) {\n    // Double ring\n    ctx.save();\n    ctx.globalAlpha=rip.a*0.55;\n    ctx.strokeStyle=rip.color; ctx.lineWidth=1.5;\n    ctx.beginPath(); ctx.arc(rip.x,rip.y,rip.r,0,Math.PI*2); ctx.stroke();\n    ctx.globalAlpha=rip.a*0.25;\n    ctx.beginPath(); ctx.arc(rip.x,rip.y,rip.r*0.62,0,Math.PI*2); ctx.stroke();\n    ctx.restore();\n    rip.r += (rip.maxR-rip.r)*0.085+1.5;\n    rip.a *= 0.875;\n  }\n}\n\nfunction drawTrails() {\n  trails = trails.filter(t=>t.a>0.005);\n  for (const tr of trails) {\n    if (tr.pts.length<2) continue;\n    ctx.save();\n    ctx.globalAlpha=tr.a*0.45;\n    ctx.strokeStyle=tr.color; ctx.lineWidth=2.5;\n    ctx.lineCap='round'; ctx.lineJoin='round';\n    ctx.beginPath();\n    ctx.moveTo(tr.pts[0].x, tr.pts[0].y);\n    for(let i=1;i<tr.pts.length;i++) ctx.lineTo(tr.pts[i].x, tr.pts[i].y);\n    ctx.stroke();\n    ctx.restore();\n    if (!tr.alive) tr.a *= 0.91;\n  }\n}\n\nfunction drawShape(s) {\n  switch(s.type) {\n    case 'circle':  drawCircleShape(s); break;\n    case 'dot':     drawDotShape(s); break;\n    case 'line':    drawLineShape(s); break;\n    case 'triangle':drawTriShape(s); break;\n    case 'rect':    drawRectShape(s); break;\n    case 'checker': drawChecker(s); break;\n    case 'arc':     drawArcShape(s); break;\n  }\n}\n\n// ── RENDER LOOP ───────────────────────────────────────\nlet ts = 0;\n\nfunction drawBg() {\n  // Subtle warm cream with very light center glow\n  ctx.fillStyle = C.cream;\n  ctx.fillRect(0,0,W,H);\n  const grad = ctx.createRadialGradient(W*0.5,H*0.42,0, W*0.5,H*0.42, Math.max(W,H)*0.62);\n  grad.addColorStop(0,'rgba(255,252,244,0.55)');\n  grad.addColorStop(1,'rgba(228,218,195,0.0)');\n  ctx.fillStyle = grad;\n  ctx.fillRect(0,0,W,H);\n}\n\nfunction loop(t) {\n  ts = t / 1000;\n  ctx.clearRect(0,0,W,H);\n  drawBg();\n  drawTrails();\n  for (const s of shapes) drawShape(s);\n  drawRipples();\n  requestAnimationFrame(loop);\n}\nrequestAnimationFrame(loop);\n\n// ── OVERLAY ───────────────────────────────────────────\ndocument.getElementById('overlay').addEventListener('click', async () => {\n  await startAudio();\n  const ov = document.getElementById('overlay');\n  ov.style.opacity='0';\n  setTimeout(()=>ov.style.display='none', 800);\n  // Fade hint after 5s\n  setTimeout(()=>{ document.getElementById('ui-hint').style.opacity='0'; }, 5000);\n});\n\n// ── TWEAKS ────────────────────────────────────────────\nwindow.addEventListener('message', e => {\n  if (e.data?.type === '__activate_edit_mode') {\n    document.getElementById('tweaks-panel').style.display = 'block';\n  } else if (e.data?.type === '__deactivate_edit_mode') {\n    document.getElementById('tweaks-panel').style.display = 'none';\n  }\n});\nwindow.parent.postMessage({type:'__edit_mode_available'},'*');\n\ndocument.getElementById('tw-reverb').addEventListener('input', e => {\n  tweaks.reverbWet = +e.target.value;\n  if (rev) rev.wet.value = tweaks.reverbWet;\n  window.parent.postMessage({type:'__edit_mode_set_keys', edits:{reverbWet:tweaks.reverbWet}},'*');\n});\ndocument.getElementById('tw-vol').addEventListener('input', e => {\n  tweaks.masterVol = +e.target.value;\n  if (master) master.volume.value = tweaks.masterVol;\n  window.parent.postMessage({type:'__edit_mode_set_keys', edits:{masterVol:tweaks.masterVol}},'*');\n});\ndocument.getElementById('tw-scale').value = tweaks.scale;\ndocument.getElementById('tw-scale').addEventListener('change', e => {\n  tweaks.scale = e.target.value;\n  window.parent.postMessage({type:'__edit_mode_set_keys', edits:{scale:tweaks.scale}},'*');\n});\ndocument.getElementById('tw-trail').addEventListener('input', e => {\n  tweaks.trailOpacity = +e.target.value;\n  window.parent.postMessage({type:'__edit_mode_set_keys', edits:{trailOpacity:tweaks.trailOpacity}},'*');\n});\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
